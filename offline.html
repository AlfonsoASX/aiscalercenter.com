<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexion - AiScaler Center</title>
    <style>
        :root {
            color-scheme: light;
            --offline-bg: linear-gradient(180deg, #eef4ff 0%, #f8fafc 45%, #ffffff 100%);
            --offline-surface: rgba(255, 255, 255, 0.94);
            --offline-border: rgba(19, 42, 74, 0.08);
            --offline-text: #202124;
            --offline-muted: #5f6368;
            --offline-accent: #1f5fd6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--offline-bg);
            color: var(--offline-text);
        }

        .offline-card {
            width: min(100%, 32rem);
            padding: 2rem;
            border: 1px solid var(--offline-border);
            border-radius: 1.75rem;
            background: var(--offline-surface);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        .offline-card img {
            width: 5rem;
            height: 5rem;
        }

        .offline-card h1 {
            margin: 1.25rem 0 0;
            font-size: clamp(2rem, 7vw, 2.8rem);
            letter-spacing: -0.05em;
        }

        .offline-card p {
            margin: 1rem 0 0;
            line-height: 1.7;
            color: var(--offline-muted);
        }

        .offline-actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .offline-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3rem;
            padding: 0 1.1rem;
            border-radius: 999px;
            border: 1px solid transparent;
            background: var(--offline-accent);
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
        }

        .offline-button--secondary {
            border-color: rgba(19, 42, 74, 0.12);
            background: #ffffff;
            color: var(--offline-text);
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <img src="img/pwa/icon-192.png" alt="AiScaler Center">
        <h1>Sin conexion</h1>
        <p>La aplicacion no pudo cargar esta vista porque no hay red disponible. Cuando recuperes conexion, vuelve a intentarlo.</p>
        <div class="offline-actions">
            <a class="offline-button" href="/app">Ir al panel</a>
            <a class="offline-button offline-button--secondary" href="/">Volver al inicio</a>
        </div>
    </main>
</body>
</html>
